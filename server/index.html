<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stockfish UCI</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <style>
    body { padding-top: 50px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Stockfish Wasm Compilation Tests</h2>

    <div class="jumbotron">
      <h3>UCI command</h3>
      <form id="form" method="POST">
        <input type="text" id="command" name="command" class="w-100" placeholder="ex: UCI" required>
        <input type="hidden" id="response" name="response">  
      </form>
    </div>

    <div class="jumbotron">
      <h3>Response</h3>
      <div id="output"></div>
    </div>
  </div>

  <script src="/sf17.js"></script>
  <script>
    let output = document.getElementById("output");
    let command = document.getElementById("command");

    Stockfish().then(sf => {
      window.sf = sf;
      console.log("Engine Ready..");

      var depth = 5;
      var listener = function (line) {
        console.log('>', line);
        if (line.includes('bestmove') && depth < 25) {
          depth++;
          console.log('============ DEPTH ' + depth + ' ============');
          sf.postMessage('go depth ' + depth);
        }
  /*
        /// Ignore some output.
        if (line === "uciok" || line === "readyok" || line.substr(0, 11) === "option name") {
          return;
        }
  */
        if (output.textContent) { output.textContent += "\n"; }
        output.textContent += line;
      };

      sf.addMessageListener(listener);
      //sf.removeMessageListener(onMessage);

//      sf.postMessage('uci');
//      sf.postMessage('setoption name UCI_AnalyseMode value true');
//      sf.postMessage('setoption name Analysis Contempt value Off');
      setTimeout(() => {
        console.log('============ START ============');
        sf.postMessage('setoption name Threads value 32');
        sf.postMessage('setoption name Hash value 1024');
        sf.postMessage('position fen 4r1k1/r1q2ppp/ppp2n2/4P3/5Rb1/1N1BQ3/PPP3PP/R5K1 w - - 1 17');
        sf.postMessage('go depth ' + depth);
      }, 3000);

      document.getElementById("form").addEventListener("submit", (e) => {
        e.preventDefault();
        console.log(command.value);
        sf.postMessage(command.value);
      })
    });
  </script>

</body>
</html>
